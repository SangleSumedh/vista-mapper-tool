<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Base Rounded Rect -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)" />
  <!-- Overlay Grid -->
  <rect width="100" height="100" rx="22" fill="url(#grid)" />
  <!-- Polygonal Census Boundary Line -->
  <polygon points="25,45 50,22 80,35 75,70 35,78" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-dasharray="2 2" />
  <!-- Glowing Detected House Polygons inside -->
  <polygon points="42,38 52,32 58,40 48,46" fill="rgba(255,255,255,0.25)" stroke="#ffffff" stroke-width="1.5" />
  <polygon points="56,58 70,52 74,62 60,68" fill="rgba(255,255,255,0.25)" stroke="#ffffff" stroke-width="1.5" />
  <!-- Bold Glowing Pin / Core Icon -->
  <g transform="translate(18, 12) scale(0.65)">
    <!-- Location Pin Shadow -->
    <ellipse cx="50" cy="85" rx="15" ry="6" fill="rgba(0,0,0,0.2)" />
    <!-- Location Pin -->
    <path d="M50 10 C30 10 15 25 15 45 C15 70 50 90 50 90 C50 90 85 70 85 45 C85 25 70 10 50 10 Z" fill="#ffffff" />
    <!-- Inner Pin Circle (Map Dot) -->
    <circle cx="50" cy="42" r="14" fill="url(#bgGrad)" />
  </g>
</svg>
